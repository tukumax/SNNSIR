name: SpikeCrossAttentionStereoDeraining
model_name: unet5_wwLifMul_snn_32to160_SRBB_SSCM_SSCA_SSRB_sr_model
net_name: SNNSIR
manual_seed: 100
resume: false
datasets:
  kind: StereoSR
  train:
    dataroot: ./data/NAFSSR/train/
    batch_size: 8
    patch_size: [30, 90]
    use_shuffle: true
    num_worker_per_gpu: 8
    gpu_id: 1
  val:
    dataroot: ./data/NAFSSR/val/
    batch_size: 8
    patch_size: [30, 90]
    num_worker_per_gpu: 2
    val_epochs: 2
  test:
    dataroot: ./data/NAFSSR/test/{}/lr_x4
    batch_size: 1
    crop_size: 64
    overlap_size: 8
    num_worker_per_gpu: 0
    gpu_id: 1
network:
  in_channels: 3
  out_channels: 3
  T: 4
  dim: 32
  bias: false
  planes: [32, 32, 32, 32, 32]
  scale: 2
  ratio: 8
  refine_dim: 32
  refine_block_num: 4
  sr_scale: 4
  v_th: 0.2
  decay_input: false
train:
  epochs: 500
  save_dir: ./checkpoints
  save_freq: 100
  scheduler:
    T_max: 500
    eta_min: 0.001
    kind: CosineAnnealingLR
  optim:
    lr: 0.001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    kind: AdamW
path:
  pretrain_network: null
  resume_state: null
  saved_path: ./checkpoints/SNNSIR/2026-03-20-21-58-44
logger:
  print_freq: 1000
  save_checkpoint_freq: 4000.0
